<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sweet Star Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="Game information">
      <div>
        <h1>Sweet Star Shooter</h1>
        <p class="subtitle">Guide the magical girl and stop the star monsters.</p>
      </div>
      <div class="stats">
        <span>Score <strong id="score">0</strong></span>
        <span>Lives <strong id="lives">3</strong></span>
      </div>
    </section>

    <canvas id="game" width="800" height="480" aria-label="Sweet Star Shooter game canvas"></canvas>

    <section class="controls" aria-label="Controls">
      <button id="startButton" type="button">Start</button>
      <p>Move: Arrow keys / WASD - Shoot: Space</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
