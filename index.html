<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Megaten Style Dungeon Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scale-stage">
      <main class="game-shell">
        <section class="viewport-wrap" aria-label="Dungeon viewport">
          <canvas id="dungeon" width="960" height="540"></canvas>
          <div class="battle-party" id="battleParty" aria-label="Battle party status">
            <div class="party-card">
              <strong>名前 1</strong>
              <div class="status-row">
                <span>HP</span>
                <div class="status-bar"><i style="width: 82%"></i></div>
                <b>82 / 100</b>
              </div>
              <div class="status-row">
                <span>MP</span>
                <div class="status-bar mp"><i style="width: 64%"></i></div>
                <b>32 / 50</b>
              </div>
            </div>
            <div class="party-card">
              <strong>名前 2</strong>
              <div class="status-row">
                <span>HP</span>
                <div class="status-bar"><i style="width: 70%"></i></div>
                <b>70 / 100</b>
              </div>
              <div class="status-row">
                <span>MP</span>
                <div class="status-bar mp"><i style="width: 88%"></i></div>
                <b>44 / 50</b>
              </div>
            </div>
            <div class="party-card">
              <strong>名前 3</strong>
              <div class="status-row">
                <span>HP</span>
                <div class="status-bar"><i style="width: 93%"></i></div>
                <b>93 / 100</b>
              </div>
              <div class="status-row">
                <span>MP</span>
                <div class="status-bar mp"><i style="width: 42%"></i></div>
                <b>21 / 50</b>
              </div>
            </div>
          </div>
          <div class="battle-command" id="battleCommand" aria-label="Battle commands">
            <button id="attackCommand" type="button">攻撃</button>
            <button id="magicCommand" type="button">魔法</button>
            <button id="guardCommand" type="button">防御</button>
            <button id="equipCommand" type="button">装備</button>
            <button id="battleItemCommand" type="button">アイテム</button>
            <button id="escapeCommand" type="button">逃げる</button>
          </div>
          <div class="battle-select" id="battleSelect" aria-label="Battle selection">
            <div class="battle-select-title" id="battleSelectTitle">選択</div>
            <div class="battle-select-options" id="battleSelectOptions"></div>
            <div class="battle-select-help">Z 決定 / X キャンセル</div>
          </div>
          <div class="hud">
            <div>
              <span class="hud-label">B1F</span>
              <strong id="positionText">X: 0 Y: 0 N</strong>
            </div>
            <div class="hud-actions">
              <button id="turnLeft" type="button" title="左回転">↺</button>
              <button id="moveForward" type="button" title="前進">↑</button>
              <button id="turnRight" type="button" title="右回転">↻</button>
            </div>
          </div>
        </section>

        <section class="command-panel" aria-label="Commands and status">
          <div class="mini-map" id="miniMap"></div>
          <div class="message-box">
            <p id="messageText">入口から開始しました。前進、後退、左右90度回転で探索できます。</p>
          </div>
          <div class="menu-grid">
            <button id="statusMenu" type="button">ステータス</button>
            <button id="itemMenu" type="button">アイテム</button>
            <button id="equipMenu" type="button">装備</button>
            <button id="saveMenu" type="button">セーブ</button>
            <button id="fieldMagicMenu" type="button">魔法</button>
            <button id="inspect" type="button">調べる</button>
            <button id="settingsMenu" type="button">設定</button>
          </div>
        </section>
        <section class="settings-overlay" id="settingsOverlay" aria-label="Settings">
          <div class="settings-window">
            <div class="settings-title">設定</div>
            <div class="settings-list">
              <button class="settings-row" id="displayModeSetting" type="button">
                <span>表示</span>
                <strong id="displayModeValue">ウィンドウ</strong>
              </button>
              <label class="settings-row">
                <span>マスター音量</span>
                <input id="masterVolume" type="range" min="0" max="100" value="50" />
                <strong id="masterVolumeValue">50</strong>
              </label>
              <label class="settings-row">
                <span>BGM音量</span>
                <input id="bgmVolume" type="range" min="0" max="100" value="50" />
                <strong id="bgmVolumeValue">50</strong>
              </label>
              <label class="settings-row">
                <span>SE音量</span>
                <input id="seVolume" type="range" min="0" max="100" value="50" />
                <strong id="seVolumeValue">50</strong>
              </label>
            </div>
            <div class="settings-help">Z 決定 / X キャンセル / ↑↓ 選択 / ←→ 調整</div>
          </div>
        </section>
        <section class="menu-overlay" id="menuOverlay" aria-label="Menu">
          <div class="menu-window">
            <div class="menu-title" id="menuOverlayTitle">メニュー</div>
            <div class="menu-detail" id="menuOverlayDetail"></div>
            <div class="menu-options" id="menuOverlayOptions"></div>
            <div class="menu-help">Z 決定 / X キャンセル / ↑↓←→ 選択</div>
          </div>
        </section>
      </main>
    </div>

    <script src="main-01.js"></script>
    <script src="main-02.js"></script>
    <script src="main-03.js"></script>
    <script src="main-04.js"></script>
    <script src="main-05.js"></script>
    <script src="main-06.js"></script>
    <script src="main-07.js"></script>
    <script src="main-08.js"></script>
    <script src="main-09.js"></script>
    <script src="main-10.js"></script>
  </body>
</html>
