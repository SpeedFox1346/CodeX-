<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Dash</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="ゲーム情報">
      <h1>Star Dash</h1>
      <div class="stats">
        <span>Score: <strong id="score">0</strong></span>
        <span>Time: <strong id="time">30</strong>s</span>
      </div>
    </section>

    <canvas id="game" width="720" height="420" aria-label="Star Dash game canvas"></canvas>

    <section class="controls" aria-label="操作">
      <button id="startButton" type="button">Start</button>
      <p>Arrow keys / WASD to move. Collect stars before time runs out.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
