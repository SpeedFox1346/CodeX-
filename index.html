<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Megaten Style Dungeon Prototype</title>
<style>
:root{color-scheme:dark;--bg:#101114;--panel:#1b1f24;--line:#54606b;--text:#f4f0e8;--muted:#aeb8bd;--accent:#d7b46a;--blue:#4e9fe6}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:"Yu Gothic UI",Meiryo,system-ui,sans-serif}button{min-height:44px;border:1px solid #697783;border-radius:6px;background:#2a333a;color:var(--text);font:inherit;font-weight:600;cursor:pointer}button:hover,button:focus-visible,.sel{border-color:var(--accent)!important;background:#3a3324!important;outline:none}.game{display:grid;grid-template-columns:minmax(0,1fr)380px;gap:16px;width:min(1360px,100%);min-height:100vh;margin:auto;padding:16px}.view,.side{border:1px solid #2f3a42;background:var(--panel)}.view{position:relative;display:grid;align-content:center;min-height:calc(100vh - 32px);overflow:hidden}canvas{display:block;width:100%;aspect-ratio:16/9;background:#08090a}.hud{position:absolute;inset:12px 12px auto;display:flex;justify-content:space-between;gap:12px;pointer-events:none}.hud>div,.mini,.msg,.select{border:1px solid rgba(228,215,183,.45);background:rgba(16,18,20,.84)}.hud>div{padding:8px 10px}.hud span{color:var(--accent);font-size:12px;margin-right:8px}.pad{display:flex;gap:8px;pointer-events:auto}.pad button{width:48px;min-height:40px}.party{position:absolute;inset:auto 18px 104px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;z-index:2;pointer-events:none}.card{border:1px solid rgba(228,215,183,.58);background:rgba(15,18,20,.88);padding:10px}.card.down{opacity:.5}.card strong{display:block;margin-bottom:8px}.row{display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:center;margin-top:7px;font-size:12px;color:var(--muted)}.bar{height:10px;border:1px solid #53616b;background:#14191d}.bar i{display:block;height:100%;background:#8fb46d}.bar.mp i{background:#6e94c7}.row b{grid-column:2;justify-self:end;color:var(--text);font-size:11px}.battlecmd{position:absolute;inset:auto 18px 18px;display:none;grid-template-columns:repeat(6,1fr);gap:8px;z-index:3}.battlecmd.show{display:grid}.select{position:absolute;inset:96px 34px 250px;display:none;grid-template-rows:auto 1fr auto;gap:10px;padding:12px;z-index:4}.select.show{display:grid}.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start;overflow:auto}.help{font-size:12px;color:var(--muted);text-align:right}.side{display:grid;grid-template-rows:auto minmax(240px,1fr) auto;gap:12px;padding:12px}.mini{display:grid;gap:2px;padding:8px;align-content:start}.cell{aspect-ratio:1;border:1px solid #1b2227;background:#303940;text-align:center;font-size:12px}.wall{background:#0d1012}.evt{background:#71552c}.boss{background:var(--blue)}.heal{background:#507c5f}.pc{background:var(--accent);color:#101114}.msg{min-height:240px;padding:14px;line-height:1.7;white-space:pre-line;overflow:auto}.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}@media(max-width:860px){.game{grid-template-columns:1fr;min-height:auto}.view{min-height:auto}.party{inset:auto 10px 92px;gap:6px}.card{padding:8px}.battlecmd{inset:auto 10px 10px;grid-template-columns:repeat(3,1fr);gap:6px}.battlecmd button{font-size:13px}.select{inset:76px 14px 210px}.opts{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<main class="game"><section class="view"><canvas id="cv" width="960" height="540"></canvas><div class="hud"><div><span>B1F</span><b id="pos"></b></div><div class="pad"><button id="l" title="左回転">↺</button><button id="f" title="前進">↑</button><button id="r" title="右回転">↻</button></div></div><div id="party" class="party"></div><div id="bcmd" class="battlecmd"><button data-cmd="atk">攻撃</button><button data-cmd="mag">魔法</button><button data-cmd="guard">防御</button><button data-cmd="eq">装備</button><button data-cmd="item">アイテム</button><button data-cmd="run">逃げる</button></div><div id="sel" class="select"><b id="st">選択</b><div id="opts" class="opts"></div><div class="help">Z 決定 / X キャンセル</div></div></section><section class="side"><div id="mini" class="mini"></div><div class="msg" id="msg">入口から開始しました。前進、後退、左右90度回転で探索できます。</div><div class="menu"><button data-menu="status">ステータス</button><button data-menu="item">アイテム</button><button data-menu="equip">装備</button><button data-menu="save">セーブ</button><button data-menu="magic">魔法</button><button data-menu="look">調べる</button></div></section></main>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),pos=document.getElementById('pos'),msg=document.getElementById('msg'),mini=document.getElementById('mini'),partyBox=document.getElementById('party'),bcmd=document.getElementById('bcmd'),sel=document.getElementById('sel'),opts=document.getElementById('opts'),st=document.getElementById('st');
const T={W:'#',F:'.',I:'I',U:'U',D:'D',C:'C',O:'O',E:'E',B:'B',H:'H'},dirs=[['N',0,-1],['E',1,0],['S',0,1],['W',-1,0]];
const baseMaps=[{id:'B1F',enc:false,rows:['#########','#I..C...#','#.###.#.#','#...#.#U#','###.#.#.#','#...E...#','#########']},{id:'B2F',enc:true,rows:['##################','#D....#.....C....#','#.##..#.####.###.#','#..#..#..........#','##.#.####..###...#','#...........H....#','#.####..######...#','#......C.........#','#.##########.#####','#..............BU#','####.#.######.####','#......#.........#','#.##############.#','##################']}];
let mi=0,map=baseMaps[0].rows.map(r=>[...r]),pl={x:1,y:1,d:1},scene='dungeon',opened=new Set(),deadBoss=new Set(),inv={herb:0},steps=0,log=[],battleMsg='',menu=null,cmd=0,actor=0,acted=0,finished=false,bKind='normal',bSrc=null,townMsg='街に到着しました。';
const party0=[['名前 1',100,50,18,22,8],['名前 2',100,50,14,28,6],['名前 3',100,50,24,10,10]],enemy0=[['ENEMY A',95,15,5],['ENEMY B',95,15,5],['ENEMY C',95,15,5]],boss0=[['BLUE BOSS',260,24,10]];
let party=party0.map(p=>({n:p[0],hp:p[1],mh:p[1],mp:p[2],mm:p[2],atk:p[3],mag:p[4],def:p[5],g:false})),enemies=[];
const ev={I:'入口です。上階から冷たい空気が流れ込んでいます。',U:'次のマップ、または街へ続く階段です。',D:'戻る階段です。',C:'宝箱があります。',O:'既に開いた宝箱だ。',H:'回復ポイントです。触れるとHPとMPが全回復します。',B:'青い気配を放つ強敵です。触れると戦闘になります。',E:'敵影を確認しました。'};
const spells=[['ファイアボール',8,28,0],['ヒール',6,0,34],['スパーク',7,24,0],['アイスニードル',9,30,0],['ウィンド',5,20,0],['ライト',10,34,0],['ダーク',10,34,0],['リカバー',9,0,46],['シールド',7,0,0,'guardAll']];
const items=[['薬草',0,0,30],['魔石',0,18,0],['解毒薬',0,0,12]],equips=['短剣','革鎧','指輪'];
function cell(x,y){return y<0||y>=map.length||x<0||x>=map[0].length?T.W:map[y][x]}function walk(x,y){return cell(x,y)!==T.W}function key(x,y){return `${mi}:${x}:${y}`}function cam(f,r){let a=dirs[pl.d],b=dirs[(pl.d+1)%4];return{x:pl.x+a[1]*f+b[1]*r,y:pl.y+a[2]*f+b[2]*r}}function say(t){msg.textContent=t}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function roll(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function load(i,tile){mi=i;map=baseMaps[mi].rows.map(r=>[...r]);for(let y=0;y<map.length;y++)for(let x=0;x<map[y].length;x++){if(map[y][x]===T.C&&opened.has(key(x,y)))map[y][x]=T.O;if(map[y][x]===T.B&&deadBoss.has(key(x,y)))map[y][x]=T.F;if(map[y][x]===tile){pl.x=x;pl.y=y}}steps=0}function heal(){party.forEach(p=>{p.hp=p.mh;p.mp=p.mm;p.g=false})}function bossAlive(){return map.some(r=>r.includes(T.B))}
function frontCell(){let d=dirs[pl.d];return{x:pl.x+d[1],y:pl.y+d[2],t:cell(pl.x+d[1],pl.y+d[2])}}function turn(v){if(scene!=='dungeon')return;pl.d=(pl.d+v+4)%4;say(`${dirs[pl.d][0]}を向きました。`);render()}function move(v){if(scene!=='dungeon')return;let d=dirs[pl.d],x=pl.x+d[1]*v,y=pl.y+d[2]*v,t=cell(x,y);if(!walk(x,y)){say('壁に阻まれています。');render();return}pl.x=x;pl.y=y;if(handle(x,y,t)){render();return}say(v>0?'前進しました。':'後退しました。');if(baseMaps[mi].enc){steps++;if(Math.random()<.05||steps>=20){steps=0;startBattle('敵影が姿を現した。コマンドを選択してください。')}}render()}
function handle(x,y,t){if(t===T.C){opened.add(key(x,y));map[y][x]=T.O;inv.herb++;say(`宝箱を開けた。薬草を手に入れた。薬草: ${inv.herb}`);return true}if(t===T.O){say('既に開いた宝箱だ。');return true}if(t===T.H){heal();say('回復ポイントに触れた。全員のHPとMPが全回復した。');return true}if(t===T.B){startBattle('青い強敵が現れた。', 'boss',{m:mi,x,y});return true}if(t===T.U){if(mi===0){load(1,T.D);say('階段を上り、次のマップへ進みました。')}else if(bossAlive())say('青い強敵が街への道を塞いでいる。倒さなければ先へ進めない。');else enterTown();return true}if(t===T.D){load(0,T.U);say('戻る階段を使い、前のマップへ戻りました。');return true}return false}
function inspect(){if(scene==='battle'&&finished){endBattle();return}if(scene==='town'){say('街を見回しました。武器屋、道具屋、宿屋、教会が並んでいます。');return}let f=frontCell(),here=cell(pl.x,pl.y);say(ev[here]?ev[here]:ev[f.t]?`正面: ${ev[f.t]}`:'周囲に目立つものはありません。')}
function startBattle(text,kind='normal',src=null){scene='battle';bKind=kind;bSrc=src;enemies=(kind==='boss'?boss0:enemy0).map(e=>({n:e[0],hp:e[1],mh:e[1],atk:e[2],def:e[3]}));party=party0.map(p=>({n:p[0],hp:p[1],mh:p[1],mp:p[2],mm:p[2],atk:p[3],mag:p[4],def:p[5],g:false}));log=[];actor=0;acted=0;finished=false;battleMsg=text;addLog(kind==='boss'?'ボス戦開始。':'戦闘開始。');render()}function liveP(){return party.filter(p=>p.hp>0)}function liveE(){return enemies.filter(e=>e.hp>0)}function curE(){return enemies.find(e=>e.hp>0)}function curP(){if(party[actor]?.hp>0)return party[actor];actor=party.findIndex(p=>p.hp>0);return party[actor]}function weakP(){return liveP().sort((a,b)=>a.hp/a.mh-b.hp/b.mh)[0]}
function addLog(t){log.push(t);if(log.length>12)log.shift();msg.textContent=log.map((l,i)=>`${i+1}. ${l}`).join('\n')}function setB(t){battleMsg=t}function dmg(a,def){return Math.max(1,a.atk-def+roll(-3,5))}function mdmg(a,s){return Math.max(1,a.mag+s[2]-Math.floor((curE()?.def||0)/2)+roll(-4,6))}
function nextActor(){for(let i=1;i<=party.length;i++){let n=(actor+i)%party.length;if(party[n].hp>0){actor=n;return}}}function finishTurn(){if(!liveE().length){finished=true;if(bKind==='boss'&&bSrc){deadBoss.add(`${bSrc.m}:${bSrc.x}:${bSrc.y}`);if(bSrc.m===mi&&map[bSrc.y]?.[bSrc.x]===T.B)map[bSrc.y][bSrc.x]=T.F}setB('敵をすべて倒しました。Zまたは調べるで探索へ戻ります。');addLog('勝利。');render();return}acted++;if(acted>=liveP().length){acted=0;enemyTurn();actor=party.findIndex(p=>p.hp>0)}else{nextActor();setB(`${curP().n} の行動を選択してください。`)}render()}
function enemyTurn(){addLog('敵ターン。');liveE().forEach(e=>{let ps=liveP();if(!ps.length)return;let p=ps[roll(0,ps.length-1)],d=Math.max(1,e.atk-p.def+roll(-2,5));if(p.g){d=Math.ceil(d/2);p.g=false}p.hp=clamp(p.hp-d,0,p.mh);addLog(`${e.n} の攻撃。${p.n} に ${d} ダメージ。`)});if(!liveP().length){finished=true;setB('味方は全滅しました。Zまたは調べるで探索へ戻ります。')}else setB(`${curP().n} の行動を選択してください。`)}
function attack(){if(finished)return;let a=curP(),e=curE(),d=dmg(a,e.def);e.hp=clamp(e.hp-d,0,e.mh);setB(`${a.n} の攻撃。${e.n} に ${d} ダメージ。`);addLog(`${a.n} は ${e.n} を攻撃。${d} ダメージ。`);finishTurn()}function guard(){if(finished)return;curP().g=true;setB(`${curP().n} は防御している。`);addLog(`${curP().n} は防御した。`);finishTurn()}function run(){if(finished)return;if(Math.random()<.5){finished=true;setB('逃走に成功しました。Zまたは調べるで探索へ戻ります。');addLog('逃走成功。')}else{setB('逃走に失敗しました。敵ターンに移ります。');addLog('逃走失敗。');acted=0;enemyTurn()}render()}
function useSpell(s){let a=curP();if(a.mp<s[1]){setB(`${a.n} のMPが足りません。`);addLog(`${s[0]} はMP不足で使えなかった。`);render();return}a.mp-=s[1];if(s[4]==='guardAll'){party.forEach(p=>{if(p.hp>0)p.g=true});setB(`${a.n} は ${s[0]} を使った。味方全員が身構えた。`)}else if(s[3]){let p=weakP(),v=Math.min(s[3]+Math.floor(a.mag/3),p.mh-p.hp);p.hp+=v;setB(`${a.n} は ${s[0]} を使った。${p.n} が ${v} 回復。`)}else{let e=curE(),d=mdmg(a,s);e.hp=clamp(e.hp-d,0,e.mh);setB(`${a.n} は ${s[0]} を唱えた。${e.n} に ${d} ダメージ。`)}addLog(setB);finishTurn()}function useItem(it){let a=curP();if(it[2]){let v=Math.min(it[2],a.mm-a.mp);a.mp+=v;setB(`${a.n} は ${it[0]} を使った。MPが ${v} 回復。`)}else{let p=weakP(),v=Math.min(it[3],p.mh-p.hp);p.hp+=v;setB(`${a.n} は ${it[0]} を使った。${p.n} が ${v} 回復。`)}addLog(battleMsg);finishTurn()}
function openMenu(type){if(scene!=='battle')return;let list=type==='mag'?spells:type==='item'?items:equips.map(e=>[e]);menu={type,i:0,list};st.textContent=type==='mag'?'魔法':type==='item'?'アイテム':'装備';setB(`${st.textContent}を選択してください。`);drawSelect();render()}function drawSelect(){opts.innerHTML='';if(!menu){sel.classList.remove('show');return}menu.list.forEach((o,i)=>{let b=document.createElement('button');b.textContent=o[0];b.className=i===menu.i?'sel':'';b.onclick=()=>{menu.i=i;confirmSel()};opts.appendChild(b)});sel.classList.add('show');opts.children[menu.i]?.scrollIntoView({block:'nearest'})}function moveSel(v){if(!menu)return;menu.i=(menu.i+v+menu.list.length)%menu.list.length;drawSelect()}function confirmSel(){let o=menu.list[menu.i],t=menu.type;menu=null;drawSelect();if(t==='mag')useSpell(o);else if(t==='item')useItem(o);else{setB(`${curP().n} は ${o[0]} を確認した。今回は行動消費なしです。`);addLog(battleMsg);render()}}function cancelSel(){menu=null;drawSelect();setB('選択をキャンセルしました。');addLog('選択をキャンセル。');render()}function endBattle(){scene='dungeon';menu=null;drawSelect();battleMsg='';log=[];say('探索画面へ戻りました。');render()}
function enterTown(){scene='town';townMsg='街に到着しました。武器屋、道具屋、宿屋、教会が並んでいます。';say('街に到着した。\n武器屋 / 道具屋 / 宿屋 / 教会 が利用できます。');render()}function leaveTown(){scene='dungeon';say('街を出て、ダンジョンへ戻りました。');render()}function fieldMenu(t){if(scene==='town'){let m={status:'教会で状態を確認しました。',item:'道具屋です。薬草や魔石を扱っています。',equip:'武器屋です。装備の品揃えは後で追加します。',save:'宿屋で休みました。全員のHPとMPが全回復しました。',magic:'魔法屋です。新しい魔法の習得は後で追加します。',look:'街を見回しました。安全な拠点です。'};if(t==='save')heal();townMsg=m[t];say(m[t]);render();return}if(t==='status')say('ステータス\n\n'+party.map(p=>`${p.n}\nHP ${p.hp}/${p.mh} MP ${p.mp}/${p.mm}\n攻撃 ${p.atk} 魔力 ${p.mag} 防御 ${p.def}`).join('\n\n'));if(t==='item')say(`アイテム\n\n薬草 x ${inv.herb}\n魔石 x 0\n解毒薬 x 0`);if(t==='equip')say('装備\n\n名前 1: 短剣 / 革鎧 / 指輪\n名前 2: 杖 / ローブ / 指輪\n名前 3: 斧 / 鎖帷子 / 護符');if(t==='magic')say('魔法\n\n'+spells.map(s=>`${s[0]} MP ${s[1]} ${s[3]?`回復 ${s[3]}`:s[4]?'全員防御':`威力 ${s[2]}`}`).join('\n'));if(t==='save')say('セーブ画面は仮メニューです。後で探索状態を保存できるようにします。');if(t==='look')inspect()}
function wallRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);ctx.strokeStyle='rgba(230,220,190,.15)';ctx.strokeRect(x,y,w,h);ctx.strokeStyle='rgba(246,231,190,.1)';for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(x+i*w/5,y);ctx.lineTo(x+i*w/5+h*.12,y+h);ctx.stroke()}for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(x,y+i*h/5);ctx.lineTo(x+w,y+i*h/5+5);ctx.stroke()}}function quad(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);p.slice(1).forEach(q=>ctx.lineTo(q[0],q[1]));ctx.closePath();ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='rgba(230,220,190,.15)';ctx.stroke()}
function drawDungeon(){let w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);let g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#12171b');g.addColorStop(.5,'#242b30');g.addColorStop(.51,'#27231d');g.addColorStop(1,'#0b0b0a');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);let fr=[{l:0,r:w,t:0,b:h},{l:170,r:790,t:78,b:462},{l:305,r:655,t:155,b:385},{l:395,r:565,t:210,b:330}],max=3;for(let d=1;d<=3;d++){let c=cam(d,0);if(cell(c.x,c.y)===T.W){max=d;break}}for(let d=max;d>=1;d--){let p=fr[d-1],c=fr[d],cc=cam(d,0),lf=cam(d-1,-1),rf=cam(d-1,1);if(cell(lf.x,lf.y)===T.W)quad([[p.l,p.t],[c.l,c.t],[c.l,c.b],[p.l,p.b]],d===1?'#343b3f':'#252c31');if(cell(rf.x,rf.y)===T.W)quad([[c.r,c.t],[p.r,p.t],[p.r,p.b],[c.r,c.b]],d===1?'#30383d':'#222a2f');if(cell(cc.x,cc.y)===T.W){wallRect(c.l,c.t,c.r-c.l,c.b-c.t,d===1?'#3a4246':'#2c3338')}else{ctx.strokeStyle='rgba(228,215,183,.2)';ctx.strokeRect(c.l,c.t,c.r-c.l,c.b-c.t);drawSprite(cc.x,cc.y,d,c)}}}
function drawSprite(x,y,d,f){let t=cell(x,y);if(!'IUDCOBHE'.includes(t))return;let cx=(f.l+f.r)/2,cy=(f.t+f.b)/2,sc=[0,.9,.55,.35][d],col={I:'#7ea0b8',U:'#c9ba7a',D:'#8da6c9',C:'#b47b42',O:'#8c6a48',B:'#4e9fe6',H:'#75b58a',E:'#b45461'}[t];ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx,cy,70*sc,90*sc,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f4f0e8';ctx.font=`${18*sc+8}px sans-serif`;ctx.textAlign='center';ctx.fillText(t,cx,cy+5)}function drawEnemy(){let w=cv.width,h=cv.height;ctx.fillStyle='#b45461';if(bKind==='boss')ctx.fillStyle='#4e9fe6';ctx.beginPath();ctx.ellipse(w/2,h*.36,w*.09,h*.19,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f2d37a';ctx.fillRect(w/2-50,h*.34,28,16);ctx.fillRect(w/2+22,h*.34,28,16);ctx.fillStyle='#f4f0e8';ctx.font='26px sans-serif';ctx.textAlign='center';ctx.fillText(bKind==='boss'?'BOSS':'ENEMY',w/2,h*.13);let total=enemies.length,alive=liveE().length,gap=28,start=w/2-(total-1)*gap/2;for(let i=0;i<total;i++){ctx.beginPath();ctx.arc(start+i*gap,h*.19,9,0,Math.PI*2);ctx.fillStyle=i<alive?'#d7b46a':'rgba(244,240,232,.22)';ctx.fill();ctx.strokeStyle='rgba(244,240,232,.8)';ctx.stroke()}}
function drawBattle(){let w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);let g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#171c20');g.addColorStop(.58,'#0d1012');g.addColorStop(1,'#050606');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(215,180,106,.22)';ctx.strokeRect(34,34,w-68,h-68);drawEnemy();ctx.fillStyle='rgba(15,18,20,.86)';ctx.fillRect(w*.18,h*.6,w*.64,56);ctx.strokeStyle='rgba(228,215,183,.58)';ctx.strokeRect(w*.18,h*.6,w*.64,56);ctx.fillStyle='#d7b46a';ctx.font='13px sans-serif';ctx.textAlign='left';ctx.fillText('現在の状況',w*.18+16,h*.6+18);ctx.fillStyle='#f4f0e8';ctx.font='17px sans-serif';ctx.fillText(battleMsg||'コマンドを選択してください。',w*.18+16,h*.6+42);let e=curE();ctx.fillStyle='#d7b46a';ctx.textAlign='right';ctx.font='14px sans-serif';ctx.fillText(e?`${e.n} HP ${e.hp}/${e.mh}`:'ENEMY HP 0/0',w*.82-16,h*.6+18)}function drawTown(){let w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#18212a';ctx.fillRect(0,0,w,h);ctx.fillStyle='#222b2f';ctx.fillRect(0,h*.58,w,h*.42);ctx.strokeStyle='rgba(215,180,106,.24)';ctx.strokeRect(34,34,w-68,h-68);['武器屋','道具屋','宿屋','教会'].forEach((n,i)=>{let x=w*(.11+i*.21),y=h*(i===1?.23:i===3?.2:.28),ww=w*.16,hh=h*.28;ctx.fillStyle=['#835f52','#58725f','#6c6485','#6b7480'][i];ctx.fillRect(x,y,ww,hh);ctx.fillStyle='#33251c';ctx.beginPath();ctx.moveTo(x-ww*.06,y);ctx.lineTo(x+ww*.5,y-hh*.28);ctx.lineTo(x+ww*1.06,y);ctx.fill();ctx.fillStyle='#f4f0e8';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(n,x+ww*.5,y+hh*.32)});ctx.font='30px sans-serif';ctx.fillText('街',w/2,h*.16);ctx.fillStyle='#d7b46a';ctx.font='17px sans-serif';ctx.fillText(townMsg,w/2,h*.68)}
function drawParty(){partyBox.innerHTML=party.map(p=>`<div class="card ${p.hp<=0?'down':''}"><strong>${p.n}</strong><div class="row"><span>HP</span><div class="bar"><i style="width:${p.hp/p.mh*100}%"></i></div><b>${p.hp} / ${p.mh}</b></div><div class="row"><span>MP</span><div class="bar mp"><i style="width:${p.mp/p.mm*100}%"></i></div><b>${p.mp} / ${p.mm}</b></div></div>`).join('')}function drawMini(){mini.innerHTML='';mini.style.gridTemplateColumns=`repeat(${map[0].length},1fr)`;for(let y=0;y<map.length;y++)for(let x=0;x<map[y].length;x++){let d=document.createElement('div'),t=cell(x,y);d.className='cell '+(t===T.W?'wall ':ev[t]?'evt ':'')+(t===T.B?'boss ':'')+(t===T.H?'heal ':'')+(x===pl.x&&y===pl.y?'pc':'');d.textContent=x===pl.x&&y===pl.y?dirs[pl.d][0]:'';mini.appendChild(d)}}function render(){if(scene==='battle')drawBattle();else if(scene==='town')drawTown();else drawDungeon();bcmd.classList.toggle('show',scene==='battle');[...bcmd.children].forEach((b,i)=>b.classList.toggle('sel',scene==='battle'&&i===cmd));drawParty();drawMini();pos.textContent=scene==='town'?'TOWN':`${baseMaps[mi].id} X: ${pl.x} Y: ${pl.y} ${dirs[pl.d][0]}`}
document.getElementById('l').onclick=()=>turn(-1);document.getElementById('r').onclick=()=>turn(1);document.getElementById('f').onclick=()=>move(1);document.querySelectorAll('[data-menu]').forEach(b=>b.onclick=()=>fieldMenu(b.dataset.menu));document.querySelectorAll('[data-cmd]').forEach((b,i)=>b.onclick=()=>{cmd=i;if(b.dataset.cmd==='atk')attack();if(b.dataset.cmd==='guard')guard();if(b.dataset.cmd==='run')run();if(b.dataset.cmd==='mag')openMenu('mag');if(b.dataset.cmd==='item')openMenu('item');if(b.dataset.cmd==='eq')openMenu('eq');render()});
window.addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(menu){if(e.key==='ArrowLeft'||k==='a')moveSel(-1);if(e.key==='ArrowRight'||k==='d')moveSel(1);if(e.key==='ArrowUp'||k==='w')moveSel(-3);if(e.key==='ArrowDown'||k==='s')moveSel(3);if(k==='z'||e.key==='Enter')confirmSel();if(k==='x'||e.key==='Escape')cancelSel();e.preventDefault();return}if(scene==='battle'){if(finished&&(k==='z'||e.key==='Enter'||e.key===' ')){endBattle();e.preventDefault();return}if(e.key==='ArrowLeft'||k==='a')cmd=(cmd+5)%6;if(e.key==='ArrowRight'||k==='d')cmd=(cmd+1)%6;if(k==='z'||e.key==='Enter')bcmd.children[cmd].click();render();e.preventDefault();return}if(scene==='town'){if(k==='x'||e.key==='Escape')leaveTown();else if(k==='z'||e.key==='Enter'||e.key===' ')fieldMenu('look');e.preventDefault();return}if(e.key==='ArrowUp'||k==='w')move(1);if(e.key==='ArrowDown'||k==='s')move(-1);if(e.key==='ArrowLeft'||k==='a')turn(-1);if(e.key==='ArrowRight'||k==='d')turn(1);if(e.key===' '||e.key==='Enter')inspect()});
render();
</script>
